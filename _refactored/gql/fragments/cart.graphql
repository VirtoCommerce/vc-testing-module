fragment CartFragment on CartType {
  id
  storeId
  isAnonymous
  hasPhysicalProducts
  customerId
  itemsCount
  itemsQuantity
  total {
    ...MoneyFragment
  }
  subTotal {
    ...MoneyFragment
  }
  subTotalDiscount {
    ...MoneyFragment
  }
  shippingTotal {
    ...MoneyFragment
  }
  items {
    ...LineItemFragment
  }
  payments {
    ...PaymentFragment
  }
  shipments {
    ...ShipmentFragment
  }
  coupons {
    ...CouponFragment
  }
  gifts {
    ...GiftItemFragment
  }
}
