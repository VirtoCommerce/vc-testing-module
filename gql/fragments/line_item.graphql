fragment LineItemFragment on LineItemType {
  id
  sku
  productId
  name
  quantity
  listPrice {
    ...MoneyFragment
  }
  salePrice {
    ...MoneyFragment
  }
  placedPrice {
    ...MoneyFragment
  }
  extendedPrice {
    ...MoneyFragment
  }
  discountAmount {
    ...MoneyFragment
  }
  selectedForCheckout
  isValid
  validationErrors {
    errorCode
    errorMessage
    errorParameters {
      key
      value
    }
    objectType
    objectId
  }
}
