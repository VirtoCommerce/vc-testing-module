[pytest]
testpaths = .
pythonpath = .
addopts = 
    --retries=1  
    --image-snapshot-save-diff
    --browser chromium 
    --browser firefox 
    --browser webkit
    -v
    --tb=short

# Warning filters to suppress known issues
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning
    ignore:.*Unknown config option.*:pytest.PytestConfigWarning
    ignore::UserWarning:_pytest.config

# Test markers for better organization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    multi_browser: marks tests as multi-browser tests
    webkit: marks tests to run only on WebKit
    firefox: marks tests to run only on Firefox
    chromium: marks tests to run only on Chromium