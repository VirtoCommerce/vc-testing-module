name: GraphQL Tests

on:
  workflow_dispatch:
  # push:
  #   branches: [ dev ]
  # pull_request:
  #   branches: [ dev ]

jobs:
  graphql-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # Needed for the publish-unit-test-result-action step below:
    # - checks: write — create the Checks status with the test-result summary
    # - pull-requests: write — post a sticky comment on the PR when the
    #   dispatched ref has an open PR
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: read

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps ${{ matrix.browser }}

      - name: Run GraphQL Tests
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          STORE_ID: store-acme
          USERS_PASSWORD: ${{ secrets.USERS_PASSWORD }}
          BACKEND_BASE_URL: https://vcptcore-demo.govirto.com
          FRONTEND_BASE_URL: https://vcptcore-demo-storefront.govirto.com
        run: |
          echo "Running GraphQL tests against ${{ env.FRONTEND_BASE_URL }}"
          pytest tests_graphql/tests/ -v -s -m "not ignore" \
            --browser ${{ matrix.browser }} \
            --tracing=retain-on-failure \
            --junitxml=graphql-junit.xml

      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.29.0
          wget -q -O allure.tgz \
            "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          sudo tar -xzf allure.tgz -C /opt
          sudo ln -sf "/opt/allure-${ALLURE_VERSION}/bin/allure" /usr/local/bin/allure
          allure --version

      - name: Generate Allure HTML report
        if: always()
        run: |
          if [ -d allure-results ] && [ -n "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results --clean -o allure-report
          else
            echo "::warning::allure-results is empty — skipping report render"
          fi

      - name: Bundle Allure into single HTML
        if: always()
        run: |
          if [ -d allure-report ]; then
            pip install allure-combine
            allure-combine allure-report
            ls -la allure-report/complete.html
          else
            echo "::warning::allure-report missing — skipping allure-combine"
          fi

      - name: Stage consolidated report
        if: always()
        run: |
          mkdir -p report
          [ -d allure-report ] && mv allure-report report/ || echo "no allure-report"
          [ -d test-results ] && mv test-results report/ || echo "no test-results"
          [ -f graphql-junit.xml ] && mv graphql-junit.xml report/ || echo "no junit.xml"

          cat > report/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=allure-report/complete.html">
            <title>GraphQL Test Results</title>
          </head>
          <body>
            <p>Redirecting to the <a href="allure-report/complete.html">Allure report</a>.
            If nothing happens, open <code>allure-report/complete.html</code> manually.</p>
          </body>
          </html>
          HTML

          cat > report/README.md << 'EOF'
          # GraphQL Test Results

          Run: ${{ github.run_number }} (attempt ${{ github.run_attempt }})
          Browser: ${{ matrix.browser }}
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}

          ## What's in this bundle

          | Path | Use it for |
          |---|---|
          | `index.html` | Landing page — double-click to open the standalone Allure report. |
          | `allure-report/complete.html` | Standalone single-file Allure report with all JS/CSS/JSON inlined. Works from a local `file://` path — no HTTP server needed. |
          | `allure-report/` (the rest) | Original multi-file Allure report. Needs an HTTP server (`python -m http.server` from this folder, or `allure open allure-report/`). |
          | `test-results/` | Playwright trace zips per failed test (from `--tracing=retain-on-failure`). Open with `playwright show-trace <file>.zip` or at [trace.playwright.dev](https://trace.playwright.dev). Absent for GraphQL-only runs that don't drive a browser. |
          | `graphql-junit.xml` | JUnit XML — for programmatic consumption (IDE integrations, other dashboards). |

          The same JUnit results drive the per-test PR comment and the per-file breakdown on the run's Summary tab.
          EOF

      - name: Upload consolidated test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graphql-test-results-${{ matrix.browser }}-${{ github.run_number }}-${{ github.run_attempt }}
          path: report/
          if-no-files-found: warn
          retention-days: 30

      - name: Publish test results summary
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: report/graphql-junit.xml
          check_name: GraphQL Test Results (${{ matrix.browser }})
          comment_mode: always
          report_individual_runs: true

      - name: Per-file test summary
        if: always()
        run: |
          python <<'PYEOF'
          import os
          import xml.etree.ElementTree as ET
          from collections import defaultdict
          from pathlib import Path

          xml_path = Path("report/graphql-junit.xml")
          if not xml_path.exists():
              print("report/graphql-junit.xml not found — skipping file summary")
              raise SystemExit(0)

          tree = ET.parse(xml_path)
          stats = defaultdict(
              lambda: {"total": 0, "passed": 0, "failed": 0, "errored": 0, "skipped": 0, "time": 0.0}
          )

          for tc in tree.iter("testcase"):
              classname = tc.attrib.get("classname", "")
              # Last dotted segment = test file (e.g. `tests_graphql.tests.test_cart` -> `test_cart`).
              bucket = classname.rsplit(".", 1)[-1] if classname else "(unknown)"
              s = stats[bucket]
              s["total"] += 1
              try:
                  s["time"] += float(tc.attrib.get("time") or 0)
              except ValueError:
                  pass
              if tc.find("failure") is not None:
                  s["failed"] += 1
              elif tc.find("error") is not None:
                  s["errored"] += 1
              elif tc.find("skipped") is not None:
                  s["skipped"] += 1
              else:
                  s["passed"] += 1

          lines = [
              f"## GraphQL tests ({os.environ.get('MATRIX_BROWSER', '?')}) — per-file breakdown",
              "",
              "| Test file | Total | Passed | Failed | Errored | Skipped | Time |",
              "|---|---:|---:|---:|---:|---:|---:|",
          ]
          totals = {"total": 0, "passed": 0, "failed": 0, "errored": 0, "skipped": 0, "time": 0.0}
          for bucket in sorted(stats):
              s = stats[bucket]
              for k in totals:
                  totals[k] += s[k]
              lines.append(
                  f"| `{bucket}` | {s['total']} | {s['passed']} | {s['failed']} | "
                  f"{s['errored']} | {s['skipped']} | {s['time']:.1f}s |"
              )
          lines.append(
              f"| **Total** | **{totals['total']}** | **{totals['passed']}** | "
              f"**{totals['failed']}** | **{totals['errored']}** | "
              f"**{totals['skipped']}** | **{totals['time']:.1f}s** |"
          )
          lines.append("")

          output = "\n".join(lines)
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(output + "\n")
          print(output)
          PYEOF
        env:
          MATRIX_BROWSER: ${{ matrix.browser }}
