name: Playwright Tests

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://vcst-qa-storefront.govirto.com
      BACK_URL: https://vcst-qa.govirto.com
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Password3
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      USER_EMAIL: b2badmin@test.com
      PASSWORD: Password1
      API_KEY: ${{ secrets.API_KEY }}
      STORE_ID: B2B-store
      PLAYWRIGHT_HEADLESS: "true"
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-html
        
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium
      
    - name: Run GraphQL Tests
      run: |
        echo "Running GraphQL tests against ${{ env.BASE_URL }}"
        pytest tests_graphql/tests/ --headed false --html=graphql-report.html --self-contained-html --tracing=retain-on-failure -v -s
      continue-on-error: true

    - name: Run E2E Tests
      run: |
        echo "Running E2E tests against ${{ env.BASE_URL }}"
        pytest e2e/ --headed false --html=e2e-report.html --self-contained-html --tracing=retain-on-failure -v -s
      continue-on-error: true
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          graphql-report.html
          e2e-report.html
          playwright-report/
          test-results/
        retention-days: 30
