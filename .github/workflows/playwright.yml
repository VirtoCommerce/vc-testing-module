name: Playwright Tests

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
        - test-type: e2e
          #browser: chromium
          #browser: firefox
          browser: webkit
        - test-type: graphql
          browser: chromium
 
    env:
      BASE_URL: https://vcst-qa-storefront.govirto.com
      BACK_URL: https://vcst-qa.govirto.com
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Password3
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      USER_EMAIL: b2badmin@test.com
      PASSWORD: Password1
      API_KEY: ${{ secrets.API_KEY }}
      STORE_ID: B2B-store
      PLAYWRIGHT_HEADLESS: "true"
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-html
        
    - name: Install Playwright Browsers
      run: playwright install --with-deps ${{ matrix.browser }}
      
    - name: Run Tests
      run: |
        if [ "${{ matrix.test-type }}" = "graphql" ]; then
          echo "Running GraphQL tests against ${{ env.BASE_URL }}"
          pytest tests_graphql/tests/ --browser ${{ matrix.browser }} --html=graphql-report.html --self-contained-html --tracing=retain-on-failure -v -s
        else
          echo "Running E2E tests against ${{ env.BASE_URL }}"
          pytest e2e/ --browser ${{ matrix.browser }} --html=e2e-report.html --self-contained-html --tracing=retain-on-failure -v -s
        fi

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.test-type }}-test-results-${{ matrix.browser }}
        path: |
          ${{ matrix.test-type }}-report.html
          playwright-report/
          test-results/
        retention-days: 30
