name: E2E Tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  e2e-legacy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium] #chromium, firefox, webkit

    env:
      FRONTEND_BASE_URL: 'https://vcptcore-demo-storefront.govirto.com'
      BACKEND_BASE_URL: 'https://vcptcore-demo.govirto.com'
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      USERS_PASSWORD: ${{ secrets.USERS_PASSWORD }}
      STORE_ID: store-acme
      PLAYWRIGHT_HEADLESS: "true"  

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html

      - name: Install Playwright Browsers
        run: playwright install --with-deps ${{ matrix.browser }}

      - name: Run legacy E2E Tests
        run: |
          echo "Running legacy E2E tests against ${{ env.FRONTEND_BASE_URL }}"
          pytest e2e/ --browser ${{ matrix.browser }} --html=e2e-legacy-report.html --self-contained-html --tracing=retain-on-failure -v -s

      - name: Upload legacy test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-legacy-test-results-${{ matrix.browser }}
          path: |
            e2e-legacy-report.html
            playwright-report/
            test-results/
          retention-days: 30

  e2e-new:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [webkit] #chromium, firefox

    env:
      FRONTEND_BASE_URL: https://vcptcore-demo-storefront.govirto.com
      BACKEND_BASE_URL: https://vcptcore-demo.govirto.com
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      USERS_PASSWORD: ${{ secrets.USERS_PASSWORD }}
      STORE_ID: store-acme      
      PLAYWRIGHT_HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html

      - name: Install Playwright Browsers
        run: playwright install --with-deps ${{ matrix.browser }}

      - name: Run new E2E Tests
        run: |
          echo "Running new E2E tests against ${{ env.FRONTEND_BASE_URL }}"
          pytest tests_e2e/tests/ -v -s --checkout-mode single-page --product-quantity-control stepper -m "not ignore" --browser ${{ matrix.browser }} --html=e2e-new-report.html --self-contained-html --tracing=retain-on-failure

      - name: Upload new test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-new-test-results-${{ matrix.browser }}
          path: |
            e2e-new-report.html
            playwright-report/
            test-results/
          retention-days: 30
