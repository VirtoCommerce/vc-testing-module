name: GraphQL Tests Refactored

on:
  workflow_dispatch:

jobs:
  graphql-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.7"
      - name: Install dependencies
        run: |
          cd _refactored
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e .
      - name: Install Playwright Browsers
        run: playwright install --with-deps ${{ matrix.browser }}
      - name: Run GraphQL Tests
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          STORE_ID: store-acme
          USERS_PASSWORD: ${{ secrets.USERS_PASSWORD }}
          BACKEND_BASE_URL: https://vcptcore-demo.govirto.com
          FRONTEND_BASE_URL: https://vcptcore-demo-storefront.govirto.com
        run: |
          echo "Running GraphQL tests against ${{ env.FRONTEND_BASE_URL }}"
          pytest /tests/graphql -m "not ignore" --tracing=retain-on-failure -v -s
