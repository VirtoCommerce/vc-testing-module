#import "currency_fragment.graphql"
#import "money_fragment.graphql"

fragment PaymentMethodFragment on PaymentMethodType {
  code
  name
  description
  logoUrl
  priority
  isAvailableForPartial
  paymentMethodType
  paymentMethodGroupType
  currency {
    ...CurrencyFragment
  }
  price {
    ...MoneyFragment
  }
  priceWithTax {
    ...MoneyFragment
  }
  total {
    ...MoneyFragment
  }
  totalWithTax {
    ...MoneyFragment
  }
}
