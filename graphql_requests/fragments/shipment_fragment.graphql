#import "cart_address_fragment.graphql"
#import "money_fragment.graphql"

fragment ShipmentFragment on ShipmentType {
  id
  shipmentMethodCode
  shipmentMethodOption
  price {
    ...MoneyFragment
  }
  priceWithTax {
    ...MoneyFragment
  }
  total {
    ...MoneyFragment
  }
  totalWithTax {
    ...MoneyFragment
  }
  deliveryAddress {
    ...CartAddressFragment
  }
}
