#import "currency_fragment.graphql"
#import "line_item_fragment.graphql"
#import "money_fragment.graphql"
#import "shipment_fragment.graphql"
#import "shipping_method_fragment.graphql"

fragment CartFragment on CartType {
  id
  storeId
  hasPhysicalProducts
  isAnonymous
  customerId
  customerName
  organizationId
  organizationName
  comment
  purchaseOrderNumber
  itemsCount
  itemsQuantity
  items {
    ...LineItemFragment
  }
  total {
    ...MoneyFragment
  }
  subTotal {
    ...MoneyFragment
  }
  currency {
    ...CurrencyFragment
  }
  availableShippingMethods {
    ...ShippingMethodFragment
  }
  shipments {
    ...ShipmentFragment
  }
}
