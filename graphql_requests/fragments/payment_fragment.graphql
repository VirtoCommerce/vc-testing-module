#import "cart_address_fragment.graphql"
#import "currency_fragment.graphql"
#import "money_fragment.graphql"

fragment PaymentFragment on PaymentType {
  id
  outerId
  paymentGatewayCode
  purpose
  currency {
    ...CurrencyFragment
  }
  amount {
    ...MoneyFragment
  }
  billingAddress {
    ...CartAddressFragment
  }
  price {
    ...MoneyFragment
  }
  priceWithTax {
    ...MoneyFragment
  }
  total {
    ...MoneyFragment
  }
  totalWithTax {
    ...MoneyFragment
  }
}
